apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ollama-config
  namespace: rag-platform
spec:
  # Reference to VaultAuth
  vaultAuthRef: rag-auth
  
  # KV v2 mount path
  mount: kv
  
  # Secret type
  type: kv-v2
  
  # Path to secret in Vault
  path: rag/ollama
  
  # Refresh interval (sync from Vault every 30 seconds)
  refreshAfter: 30s
  
  # Destination Kubernetes Secret
  destination:
    # Create the secret if it doesn't exist
    create: true
    
    # Name of the Kubernetes Secret
    name: ollama-credentials
    
    # Type of Kubernetes Secret
    type: Opaque
  
  # Automatically restart deployments when secret changes
  rolloutRestartTargets:
  - kind: Deployment
    name: query-service
  - kind: Deployment
    name: ollama
