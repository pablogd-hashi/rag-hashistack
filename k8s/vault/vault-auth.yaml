apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: rag-auth
  namespace: rag-platform
spec:
  # Reference to VaultConnection
  vaultConnectionRef: vault-connection
  
  # Authentication method
  method: kubernetes
  
  # Kubernetes auth mount path in Vault
  mount: kubernetes
  
  # Kubernetes-specific configuration
  kubernetes:
    # Vault role to use
    role: rag-role
    
    # ServiceAccount to use for authentication
    serviceAccount: default
    
    # Audiences for the JWT token (optional)
    audiences:
    - vault
