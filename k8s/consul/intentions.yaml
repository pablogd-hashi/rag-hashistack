---
# Allow UI to communicate with query-service
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: ui-to-query-service
  namespace: rag-platform
spec:
  destination:
    name: query-service
  sources:
  - name: ui
    action: allow
    description: "Allow UI to query the RAG service"
---
# Allow query-service to communicate with Qdrant
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: query-service-to-qdrant
  namespace: rag-platform
spec:
  destination:
    name: qdrant
  sources:
  - name: query-service
    action: allow
    description: "Allow query service to access Qdrant vector database"
---
# Allow query-service to communicate with Ollama
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: query-service-to-ollama
  namespace: rag-platform
spec:
  destination:
    name: ollama
  sources:
  - name: query-service
    action: allow
    description: "Allow query service to access Ollama LLM"
---
# Allow ingest job to communicate with Qdrant
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: ingest-to-qdrant
  namespace: rag-platform
spec:
  destination:
    name: qdrant
  sources:
  - name: ingest
    action: allow
    description: "Allow ingest job to write to Qdrant"
---
# Allow ingest job to communicate with Ollama
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: ingest-to-ollama
  namespace: rag-platform
spec:
  destination:
    name: ollama
  sources:
  - name: ingest
    action: allow
    description: "Allow ingest job to generate embeddings via Ollama"
---
# Deny all other traffic by default
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceIntentions
metadata:
  name: deny-all
  namespace: rag-platform
spec:
  destination:
    name: "*"
  sources:
  - name: "*"
    action: deny
    description: "Deny all traffic by default - explicit allow required"
