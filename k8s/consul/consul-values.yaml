global:
  openshift:
    enabled: true

  imagePullPolicy: IfNotPresent

  # docker.io prefix required — without it OCP redirects to registry.connect.redhat.com
  image: "docker.io/hashicorp/consul:1.22.5"
  imageK8S: "docker.io/hashicorp/consul-k8s-control-plane:1.9.5"
  imageConsulDataplane: "docker.io/hashicorp/consul-dataplane:1.9.5"

  tls:
    enabled: true
    verify: false

  # Vault PKI as the Connect CA — all SPIFFE SVIDs are signed by Vault,
  # not Consul's built-in CA. See scripts/configure-vault.sh for setup.
  connectCA:
    provider: "vault"
    vaultConfig:
      address: "http://vault.vault.svc.cluster.local:8200"
      token: "root"
      rootPKIPath: "connect_root"
      intermediatePKIPath: "connect_inter"

server:
  storageClass: ""

connectInject:
  enabled: true
  apiGateway:
    managedGatewayClass:
      enabled: true
      serviceType: ClusterIP

ui:
  service:
    type: ClusterIP
