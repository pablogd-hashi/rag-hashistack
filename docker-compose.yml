services:
  # ── PKI / CA ─────────────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15.4
    container_name: vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    networks:
      mesh:
        ipv4_address: 10.10.0.10
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Service Mesh ─────────────────────────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.22.5
    container_name: consul
    # connect { enabled } turns on the service mesh so Consul can issue
    # SPIFFE SVIDs; grpc port is required for Envoy xDS / proxy registration.
    command: >
      agent -dev
      -client=0.0.0.0
      -bind=10.10.0.11
      -hcl='connect { enabled = true }'
      -hcl='ports { grpc = 8502 }'
    ports:
      - "8500:8500"
      - "8502:8502"
    networks:
      mesh:
        ipv4_address: 10.10.0.11
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Bootstrap (one-shot) ──────────────────────────────────────────────────────
  # Wires Vault PKI as Consul's Connect CA so all SPIFFE SVIDs are signed by
  # Vault's connect_inter mount (same two-tier hierarchy as the OCP path).
  # Also registers services and creates allow intentions.
  bootstrap:
    image: curlimages/curl:latest
    container_name: bootstrap
    restart: "no"
    user: root
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        apk add --no-cache jq >/dev/null 2>&1

        echo "=== Waiting for Vault ==="
        until curl -sf http://vault:8200/v1/sys/health >/dev/null; do sleep 2; done
        echo "Vault ready"

        echo "=== connect_root PKI (root CA) ==="
        curl -sf -X POST http://vault:8200/v1/sys/mounts/connect_root \
          -H "X-Vault-Token: root" \
          -d '{"type":"pki"}' 2>/dev/null || echo "  (already enabled)"
        curl -sf -X POST http://vault:8200/v1/sys/mounts/connect_root/tune \
          -H "X-Vault-Token: root" \
          -d '{"max_lease_ttl":"87600h"}'
        curl -sf -X POST http://vault:8200/v1/connect_root/root/generate/internal \
          -H "X-Vault-Token: root" \
          -d '{"common_name":"Consul Connect Root CA","ttl":"87600h"}' \
          >/dev/null 2>&1 || echo "  (root CA exists)"
        curl -sf -X POST http://vault:8200/v1/connect_root/config/urls \
          -H "X-Vault-Token: root" \
          -d '{"issuing_certificates":"http://vault:8200/v1/connect_root/ca","crl_distribution_points":"http://vault:8200/v1/connect_root/crl"}'
        echo "  connect_root ready"

        echo "=== connect_inter PKI (intermediate CA) ==="
        curl -sf -X POST http://vault:8200/v1/sys/mounts/connect_inter \
          -H "X-Vault-Token: root" \
          -d '{"type":"pki"}' 2>/dev/null || echo "  (already enabled)"
        curl -sf -X POST http://vault:8200/v1/sys/mounts/connect_inter/tune \
          -H "X-Vault-Token: root" \
          -d '{"max_lease_ttl":"8760h"}'
        curl -sf -X POST http://vault:8200/v1/connect_inter/config/urls \
          -H "X-Vault-Token: root" \
          -d '{"issuing_certificates":"http://vault:8200/v1/connect_inter/ca","crl_distribution_points":"http://vault:8200/v1/connect_inter/crl"}'
        CSR=$$(curl -sf -X POST http://vault:8200/v1/connect_inter/intermediate/generate/internal \
          -H "X-Vault-Token: root" \
          -H "Content-Type: application/json" \
          -d '{"common_name":"Consul Connect Intermediate CA","issuer_name":"connect-intermediate"}' \
          | jq -r '.data.csr')
        if [ -n "$$CSR" ] && [ "$$CSR" != "null" ]; then
          SIGN_BODY=$$(jq -n --arg csr "$$CSR" '{"csr":$$csr,"format":"pem_bundle","ttl":"8760h"}')
          CERT=$$(curl -sf -X POST http://vault:8200/v1/connect_root/root/sign-intermediate \
            -H "X-Vault-Token: root" \
            -H "Content-Type: application/json" \
            -d "$$SIGN_BODY" \
            | jq -r '.data.certificate')
          SET_BODY=$$(jq -n --arg cert "$$CERT" '{"certificate":$$cert}')
          curl -sf -X POST http://vault:8200/v1/connect_inter/intermediate/set-signed \
            -H "X-Vault-Token: root" \
            -H "Content-Type: application/json" \
            -d "$$SET_BODY"
          echo "  connect_inter signed by connect_root"
        fi

        echo "=== Waiting for Consul ==="
        until curl -sf http://consul:8500/v1/status/leader | grep -q .; do sleep 2; done
        echo "Consul ready"

        echo "=== Pointing Consul Connect CA at Vault ==="
        curl -sf -X PUT http://consul:8500/v1/connect/ca/configuration \
          -H "Content-Type: application/json" \
          -d '{
            "Provider": "vault",
            "Config": {
              "Address": "http://vault:8200",
              "Token": "root",
              "RootPKIPath": "connect_root",
              "IntermediatePKIPath": "connect_inter",
              "LeafCertTTL": "72h",
              "PrivateKeyType": "rsa",
              "PrivateKeyBits": 2048
            }
          }'
        echo "  Consul Connect CA -> Vault (SPIFFE SVIDs now signed by connect_inter)"

        echo "=== Registering services ==="
        curl -sf -X PUT http://consul:8500/v1/agent/service/register \
          -H "Content-Type: application/json" \
          -d '{
            "name": "qdrant",
            "port": 6333,
            "address": "10.10.0.20",
            "connect": {"sidecar_service": {}},
            "check": {"tcp": "10.10.0.20:6333", "interval": "10s", "timeout": "3s"}
          }'
        curl -sf -X PUT http://consul:8500/v1/agent/service/register \
          -H "Content-Type: application/json" \
          -d '{
            "name": "query-service",
            "port": 8000,
            "address": "10.10.0.30",
            "connect": {
              "sidecar_service": {
                "proxy": {
                  "upstreams": [{"destination_name": "qdrant", "local_bind_port": 9001}]
                }
              }
            },
            "check": {"http": "http://10.10.0.30:8000/health", "interval": "10s", "timeout": "3s"}
          }'
        curl -sf -X PUT http://consul:8500/v1/agent/service/register \
          -H "Content-Type: application/json" \
          -d '{
            "name": "ui",
            "port": 8501,
            "address": "10.10.0.40",
            "connect": {
              "sidecar_service": {
                "proxy": {
                  "upstreams": [{"destination_name": "query-service", "local_bind_port": 9000}]
                }
              }
            }
          }'
        echo "  Registered: qdrant, query-service, ui"

        echo "=== Creating intentions (allow ui->query-service, query-service->qdrant) ==="
        curl -sf -X PUT "http://consul:8500/v1/connect/intentions/exact?source=ui&destination=query-service" \
          -H "Content-Type: application/json" \
          -d '{"Action": "allow"}' || true
        curl -sf -X PUT "http://consul:8500/v1/connect/intentions/exact?source=query-service&destination=qdrant" \
          -H "Content-Type: application/json" \
          -d '{"Action": "allow"}' || true

        echo ""
        echo "=== Bootstrap complete ==="
        echo "  Vault PKI:    connect_root -> connect_inter"
        echo "  Consul CA:    Provider=vault (SPIFFE SVIDs via connect_inter)"
        echo "  Intentions:   ui->query-service allow, query-service->qdrant allow"
    networks:
      mesh:
        ipv4_address: 10.10.0.12
    depends_on:
      vault:
        condition: service_healthy
      consul:
        condition: service_healthy

  # ── Vector DB ─────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      mesh:
        ipv4_address: 10.10.0.20
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant-sidecar:
    image: hashicorp/consul:1.22.5
    container_name: qdrant-sidecar
    command: consul connect proxy -sidecar-for qdrant
    environment:
      CONSUL_HTTP_ADDR: http://10.10.0.11:8500
    network_mode: "service:qdrant"
    depends_on:
      consul:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  # ── Ingest (one-shot, profile) ────────────────────────────────────────────────
  ingest:
    build: ./ingest
    profiles: ["ingest"]
    environment:
      QDRANT_URL: "http://qdrant:6333"
      OLLAMA_URL: "http://host.docker.internal:11434"
      EMBED_MODEL: "nomic-embed-text"
      COLLECTION: "platform-docs"
      DOCS_PATH: "/docs"
    volumes:
      - ./docs:/docs:ro
    networks:
      - mesh
    depends_on:
      qdrant:
        condition: service_healthy

  # ── Query Service ─────────────────────────────────────────────────────────────
  # Talks to qdrant via its sidecar upstream on 127.0.0.1:9001 (mTLS through mesh)
  query-service:
    build: ./query-service
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: "http://127.0.0.1:9001"
      OLLAMA_URL: "http://host.docker.internal:11434"
      EMBED_MODEL: "nomic-embed-text"
      LLM_MODEL: "phi3"
      COLLECTION: "platform-docs"
      TOP_K: "3"
    networks:
      mesh:
        ipv4_address: 10.10.0.30
    depends_on:
      qdrant:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  query-service-sidecar:
    image: hashicorp/consul:1.22.5
    container_name: query-service-sidecar
    command: consul connect proxy -sidecar-for query-service
    environment:
      CONSUL_HTTP_ADDR: http://10.10.0.11:8500
    network_mode: "service:query-service"
    depends_on:
      consul:
        condition: service_healthy
      query-service:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  # ── UI ────────────────────────────────────────────────────────────────────────
  # Talks to query-service via its sidecar upstream on 127.0.0.1:9000 (mTLS through mesh)
  ui:
    build: ./ui
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://127.0.0.1:9000"
    networks:
      mesh:
        ipv4_address: 10.10.0.40
    depends_on:
      query-service:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

  ui-sidecar:
    image: hashicorp/consul:1.22.5
    container_name: ui-sidecar
    command: consul connect proxy -sidecar-for ui
    environment:
      CONSUL_HTTP_ADDR: http://10.10.0.11:8500
    network_mode: "service:ui"
    depends_on:
      consul:
        condition: service_healthy
      ui:
        condition: service_started
      bootstrap:
        condition: service_completed_successfully

networks:
  mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

volumes:
  qdrant_data:
